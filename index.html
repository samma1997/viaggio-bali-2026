function useLocalStorage(key, defaultVal) {
  const [val, setVal] = useState(() => { try { const stored = localStorage.getItem(key); return stored ? JSON.parse(stored) : defaultVal; } catch { return defaultVal; } });
  useEffect(() => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }, [key, val]);
  return [val, setVal];
}

function Card({ it, done, onOpen, onToggle }) {

        it.type === 'experience' ? '✋ Esperienza' :
        it.type === 'food' ? '🍜 Cibo' :
        it.type === 'culture' ? '🪔 Cultura' :
        it.type === 'fullday' ? '🌞 Tutto il giorno' :
        `🌅 ${it.nights}N Weekend`

        const emojiOf = (tag) => { const parts = (tag || '').split(' '); return parts[parts.length - 1] || '•'; };
        const shortAction = (a) => { const w = a.split(' '); return w.slice(0, 2).join(' ') + (w.length > 2 ? '…' : ''); };
        return h('div', { className: 'card-preview' },
          preview.flatMap((s, i) => {
            const items = [

                h('span', { className: 'preview-time' }, s.time.replace(/^(SAB|DOM|VEN) /, '')),
                h('span', { className: 'preview-emoji' }, emojiOf(s.tag)),
                h('span', { className: 'preview-action' }, shortAction(s.action))

  return h('div', { className: 'content' },
    weeks.map(w => h('div', { key: w.n, className: 'week-card' },
      h('div', { className: 'week-header' }, h('div', { className: 'week-num' }, w.n), h('div', { className: 'week-title' }, w.title)),
      h('div', { className: 'week-sub' }, w.sub),
      h('div', { className: 'week-note' }, w.note),
      listIds(w.quicks, 'Vicino Canggu', '🛵'),
      listIds(w.mornings, 'Mattine', '☀️'),
      w.weekend && (() => { const it = itineraries.find(x => x.id === w.weekend); return h(React.Fragment, null, h('div', { className: 'week-list-title' }, '🌅 Weekend'), h('div', { className: `week-list-item ${completed[w.weekend] ? 'done' : ''}`, onClick: () => onOpen(w.weekend) }, h('span', { className: 'emoji' }, it.emoji), it.name, completed[w.weekend] && ' ✓')); })(),
      listIds(w.experiences, 'Esperienze', '✋'),
      listIds(w.food, 'Cibo & sera', '🍜'),
      listIds(w.culture, 'Cultura / cerimonia', '🪔')
    ))
  );
}

const root = createRoot(document.getElementById('root'));
root.render(h(App));
</script>
</body>
</html>
