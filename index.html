    stops: [

const diffMap = { easy: { label: 'Facile', emoji: '🟢' }, medium: { label: 'Medio', emoji: '🟡' }, hard: { label: 'Tosto', emoji: '🔴' } };

function useLocalStorage(key, defaultVal) {
  const [val, setVal] = useState(() => { try { const stored = localStorage.getItem(key); return stored ? JSON.parse(stored) : defaultVal; } catch { return defaultVal; } });
  useEffect(() => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }, [key, val]);
  return [val, setVal];
}

function App() {
  const [completed, setCompleted] = useLocalStorage('bali-done-v3', {});
  const [tab, setTab] = useState('explore');
  const [filter, setFilter] = useState('all');
  const [openId, setOpenId] = useState(null);
  const [showInstall, setShowInstall] = useLocalStorage('bali-install-hidden', false);

  const stats = useMemo(() => {
    const done = Object.values(completed).filter(Boolean).length;
    const days = Math.max(0, Math.ceil((END_DATE - new Date()) / (1000*60*60*24)));
    return { done, total: itineraries.length, days };
  }, [completed]);

  const filtered = useMemo(() => {
    if (filter === 'all') return itineraries;
    if (filter === 'morning') return itineraries.filter(i => i.type === 'morning');
    if (filter === 'weekend') return itineraries.filter(i => i.type === 'weekend');
    if (filter === 'todo') return itineraries.filter(i => !completed[i.id]);
    if (filter === 'easy') return itineraries.filter(i => i.difficulty === 'easy');
    return itineraries;
  }, [filter, completed]);

  const todayRec = useMemo(() => {
    const now = new Date(); const day = now.getDay(); const hour = now.getHours();
    const dayName = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'][day];
    const isWeekend = day === 5 || day === 6 || day === 0;
    if (isWeekend) return { day: dayName, msg: 'È weekend, giornata piena 🎉', sub: 'Hai tempo per un trip lungo. Ecco i migliori weekend disponibili.', emoji: '🌴', recs: itineraries.filter(i => i.type === 'weekend' && !completed[i.id]).slice(0, 3) };
    if (hour >= 13) return { day: dayName, msg: 'Lavoro time 💻', sub: 'Tardi per uscire. Pianifica domani mattina, sveglia presto.', emoji: '🌙', recs: itineraries.filter(i => i.type === 'morning' && !completed[i.id]).slice(0, 3) };
    if (hour < 6) return { day: dayName, msg: 'Sveglia perfetta ☀️', sub: 'Sei in tempo per qualsiasi mattina. Parti adesso, eviti traffico e caldo.', emoji: '🌅', recs: itineraries.filter(i => i.type === 'morning' && !completed[i.id]).slice(0, 4) };
    const left = 13 - hour;
    return { day: dayName, msg: `Hai ~${left}h prima del rientro`, sub: 'Trip vicini a Canggu, niente di troppo lungo.', emoji: '⏰', recs: itineraries.filter(i => i.type === 'morning' && !completed[i.id] && i.drive <= left * 30).slice(0, 4) };
  }, [completed]);

  const openIt = itineraries.find(i => i.id === openId);

  return h('div', null,
    h('div', { className: 'header' },
      h('div', { className: 'header-top' },
        h('div', { className: 'logo' }, h('span', { className: 'logo-emoji' }, '🌴'), 'bali·trip'),
        h('div', { className: 'day-counter' }, '🗓️ ', h('span', { className: 'num' }, stats.days), ' giorni')
      ),
      h('div', { className: 'progress-row' },
        h('span', { className: 'progress-text' }, `${stats.done}/${stats.total}`),
        h('div', { className: 'progress-bar' }, h('div', { className: 'progress-fill', style: { width: `${(stats.done/stats.total)*100}%` } })),
        h('span', null, `${Math.round((stats.done/stats.total)*100)}%`)
      )
    ),
    h('div', { className: 'tabs' },
      [{ id: 'explore', label: 'Esplora', emoji: '🧭' }, { id: 'today', label: 'Oggi', emoji: '☀️' }, { id: 'plan', label: '4 settimane', emoji: '📅' }].map(t =>
        h('button', { key: t.id, className: `tab ${tab === t.id ? 'active' : ''}`, onClick: () => setTab(t.id) },
          h('span', { className: 'tab-emoji' }, t.emoji), t.label
        )
      )
    ),
    tab === 'explore' && h(React.Fragment, null,
      h('div', { className: 'filters' },
        [{ id: 'all', label: 'Tutto', emoji: '✨' }, { id: 'morning', label: 'Mattine', emoji: '☀️' }, { id: 'weekend', label: 'Weekend', emoji: '🌅' }, { id: 'easy', label: 'Facile', emoji: '🟢' }, { id: 'todo', label: 'Da fare', emoji: '📌' }].map(f =>
          h('button', { key: f.id, className: `pill ${filter === f.id ? 'active' : ''}`, onClick: () => setFilter(f.id) },
            h('span', { className: 'pill-emoji' }, f.emoji), f.label
          )
        )
      ),
      h('div', { className: 'content' },
        filtered.length === 0
          ? h('div', { className: 'empty' }, h('span', { className: 'empty-emoji' }, '🎉'), h('div', { className: 'empty-title' }, 'Tutto fatto!'), h('div', { className: 'empty-sub' }, 'Hai completato tutti gli itinerari di questa categoria.'))
          : filtered.map(it => h(Card, { key: it.id, it, done: !!completed[it.id], onOpen: () => setOpenId(it.id), onToggle: (e) => { e.stopPropagation(); setCompleted({ ...completed, [it.id]: !completed[it.id] }); } }))
      )
    ),
    tab === 'today' && h('div', { className: 'content' },
      h('div', { className: 'today-hero' }, h('span', { className: 'today-emoji' }, todayRec.emoji), h('div', { className: 'today-day' }, todayRec.day), h('div', { className: 'today-msg' }, todayRec.msg), h('div', { className: 'today-sub' }, todayRec.sub)),
      todayRec.recs.length === 0
        ? h('div', { className: 'empty' }, h('span', { className: 'empty-emoji' }, '✨'), h('div', { className: 'empty-title' }, 'Niente in lista oggi'), h('div', { className: 'empty-sub' }, 'Cambia filtri o riposati.'))
        : todayRec.recs.map(it => h(Card, { key: it.id, it, done: !!completed[it.id], onOpen: () => setOpenId(it.id), onToggle: (e) => { e.stopPropagation(); setCompleted({ ...completed, [it.id]: !completed[it.id] }); } }))
    ),
    tab === 'plan' && h(PlanView, { completed, setCompleted, onOpen: setOpenId }),
    h(Sheet, { it: openIt, onClose: () => setOpenId(null), done: openIt && !!completed[openIt.id], onToggle: () => openIt && setCompleted({ ...completed, [openIt.id]: !completed[openIt.id] }) }),
    !showInstall && /iPhone|iPad|iPod/.test(navigator.userAgent) && !window.matchMedia('(display-mode: standalone)').matches &&
      h('div', { className: 'install-hint' }, h('span', { className: 'emoji' }, '📲'), h('div', { className: 'install-hint-text' }, h('strong', null, 'Salva sul telefono'), 'Tap su Condividi → "Aggiungi a Home"'), h('button', { onClick: () => setShowInstall(true) }, '×'))
  );
}

function Card({ it, done, onOpen, onToggle }) {
  const diff = diffMap[it.difficulty];
  return h('div', { className: `card ${done ? 'done' : ''}`, onClick: onOpen },
    h('div', { className: `card-hero gradient-${it.gradient}` },
      h('div', { className: 'card-hero-bg' }, it.emoji),
      h('div', { className: 'card-badge' }, it.type === 'morning' ? '☀️ Mattina' : `🌅 ${it.nights}N Weekend`),
      h('button', { className: `card-fav ${done ? 'done' : ''}`, onClick: onToggle }, done ? '✓' : '♡')
    ),
    h('div', { className: 'card-content' },
      h('div', { className: 'card-title-row' }, h('div', { className: 'card-title' }, it.name), h('div', { className: 'card-rating' }, '★ ', it.rating)),
      h('div', { className: 'card-tagline' }, it.tagline),
      h('div', { className: 'card-meta' }, h('span', null, '⏱️ ', it.duration), h('span', null, '🛵 ', it.drive, 'min'), h('span', null, diff.emoji, ' ', diff.label)),
      h('div', { className: 'card-price' }, h('strong', null, it.cost), ' · parti ', it.leaveBy)
    )
  );
}

function Sheet({ it, onClose, done, onToggle }) {
  if (!it) return null;
  const diff = diffMap[it.difficulty];
  return h(React.Fragment, null,
    h('div', { className: 'sheet-overlay open', onClick: onClose }),
    h('div', { className: 'sheet open' },
      h('div', { className: 'sheet-handle', onClick: onClose }),
      h('div', { className: 'sheet-content' },
        h('div', { className: `sheet-hero gradient-${it.gradient}` }, it.emoji),
        h('div', { className: 'sheet-title' }, it.name),
        h('div', { className: 'sheet-tagline' }, it.tagline),
        h('div', { className: 'stats-row' },
          h('div', { className: 'stat-box' }, h('span', { className: 'stat-emoji' }, '⏱️'), h('div', { className: 'stat-val' }, it.duration), h('div', { className: 'stat-lbl' }, 'durata')),
          h('div', { className: 'stat-box' }, h('span', { className: 'stat-emoji' }, '🛵'), h('div', { className: 'stat-val' }, it.drive + 'min'), h('div', { className: 'stat-lbl' }, 'da Canggu')),
          h('div', { className: 'stat-box' }, h('span', { className: 'stat-emoji' }, diff.emoji), h('div', { className: 'stat-val' }, diff.label), h('div', { className: 'stat-lbl' }, 'difficoltà'))
        ),
        h('div', { className: 'section-title' }, '⏰ Programma'),
        h('div', { className: 'timeline' },
          it.stops.map((s, i) => h('div', { key: i, className: 'timeline-item' },
            h('div', { className: 'timeline-time' }, s.time),
            h('div', { className: 'timeline-marker' }, h('div', { className: `timeline-dot ${s.tag ? '' : 'minor'}` }), h('div', { className: 'timeline-line' })),
            h('div', { className: 'timeline-content' }, h('div', { className: 'timeline-action' }, s.action), h('div', { className: 'timeline-detail' }, s.detail), s.tag && h('span', { className: 'timeline-tag' }, s.tag))
          ))
        ),
        h('div', { className: 'tip-box green' }, h('div', { className: 'tip-header' }, '💡 Perché farlo'), h('div', { className: 'tip-text' }, it.why)),
        h('div', { className: 'budget-box' }, h('div', { className: 'budget-lbl' }, '💰 Budget stimato'), h('div', { className: 'budget-val' }, it.cost)),
        h('div', { className: 'btn-row' },
          h('button', { className: `btn btn-primary ${done ? 'done' : ''}`, onClick: onToggle }, done ? '✓ Completato' : '○ Segna come fatto'),
          h('button', { className: 'btn btn-secondary', onClick: () => {
            const places = { 'tanah lot': [-8.621213, 115.086807], 'taman ayun': [-8.5418, 115.1725], 'tirta empul': [-8.4157, 115.3153], 'tegallalang': [-8.4317, 115.2793], 'jatiluwih': [-8.3701, 115.1312], 'ulun danu': [-8.2752, 115.1668], 'tibumana': [-8.5068, 115.3331], 'tukad cepung': [-8.4410, 115.3868], 'sekumpul': [-8.1775, 115.1826], 'banyumala': [-8.2172, 115.1017], 'munduk': [-8.2541, 115.0791], 'wanagiri': [-8.2403, 115.1075], 'sidemen': [-8.4648, 115.4478], 'tirta gangga': [-8.4123, 115.5873], 'lempuyang': [-8.3918, 115.6316], 'besakih': [-8.3740, 115.4526], 'amed': [-8.3379, 115.6630], 'batur': [-8.2309, 115.4071], 'kintamani': [-8.2309, 115.4071], 'penida': [-8.7514, 115.4732], 'kelingking': [-8.7514, 115.4732] };
            const firstStop = it.stops.find(s => s.tag); let target = null;
            for (const key in places) { if (firstStop && firstStop.action.toLowerCase().includes(key)) { target = places[key]; break; } }
            if (!target) target = [-8.45, 115.25];
            window.open(`https://www.google.com/maps/dir/?api=1&origin=${CANGGU.lat},${CANGGU.lng}&destination=${target[0]},${target[1]}&travelmode=driving`, '_blank');
          } }, '🗺️ Mappa')
        )
      )
    )
  );
}

function PlanView({ completed, setCompleted, onOpen }) {
  const weeks = [
    { n: 1, title: 'Adattamento', sub: 'Tieni breve, no trip lunghi', mornings: ['it-1'], weekend: 'it-5', note: 'Hai cambiato fuso e clima. Una mattina sola di esplorazione, il weekend lo dedichi al nord che è la zona più "wow" e meno faticosa.' },
    { n: 2, title: 'Cultura Ubud', sub: 'Templi e risaie classiche', mornings: ['it-3', 'it-2'], weekend: 'it-6', note: 'Settimana centrale, sei in pieno ritmo. Due mattine ambiziose verso Ubud + weekend a Sidemen per la costa est.' },
    { n: 3, title: 'Slow + vulcano', sub: 'Mattine corte, weekend epico', mornings: ['it-4'], weekend: 'it-7', note: 'Dopo due weekend pieni serve recupero. Una mattina lunga (Jatiluwih), poi alba sul vulcano: una notte sola.' },
    { n: 4, title: 'Chiusura', sub: 'Quello che è rimasto', mornings: [], weekend: 'it-8', note: 'Ultimi giorni. Recuperi quello che hai saltato. Nusa Penida opzionale.' },
  ];
  return h('div', { className: 'content' },
    weeks.map(w => h('div', { key: w.n, className: 'week-card' },
      h('div', { className: 'week-header' }, h('div', { className: 'week-num' }, w.n), h('div', { className: 'week-title' }, w.title)),
      h('div', { className: 'week-sub' }, w.sub),
      h('div', { className: 'week-note' }, w.note),
      w.mornings.length > 0 && h(React.Fragment, null,
        h('div', { className: 'week-list-title' }, '☀️ Mattine'),
        w.mornings.map(id => { const it = itineraries.find(x => x.id === id); return h('div', { key: id, className: `week-list-item ${completed[id] ? 'done' : ''}`, onClick: () => onOpen(id) }, h('span', { className: 'emoji' }, it.emoji), it.name, completed[id] && ' ✓'); })
      ),
      h('div', { className: 'week-list-title' }, '🌅 Weekend'),
      (() => { const it = itineraries.find(x => x.id === w.weekend); return h('div', { className: `week-list-item ${completed[w.weekend] ? 'done' : ''}`, onClick: () => onOpen(w.weekend) }, h('span', { className: 'emoji' }, it.emoji), it.name, completed[w.weekend] && ' ✓'); })()
    ))
  );
}

const root = createRoot(document.getElementById('root'));
root.render(h(App));
</script>
